<!-- Quotations page header -->
<div style="display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:24px;">
    <div>
        <div style="display:flex;align-items:center;gap:6px;margin-bottom:8px;">
            <span style="display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:4px;background:#EDFBFD;font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;color:#0E7589;border:1px solid #C5F1F7;">
                <span style="width:5px;height:5px;border-radius:50%;background:#0E7589;display:inline-block;"></span>
                Live
            </span>
            <span style="font-size:11px;color:#64748B;">Multi-currency quotations</span>
        </div>
        <h2 style="font-size:20px;font-weight:700;letter-spacing:-0.03em;color:#0F172A;margin:0 0 2px;">Quotations</h2>
        <p style="font-size:12px;color:#475569;margin:0;max-width:500px;">All sent quotations with their current approval status.</p>
    </div>
    <div style="display:flex;align-items:center;gap:6px;flex-shrink:0;">
        <span style="font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;color:#64748B;">Status</span>
        <div style="background:#fff;border:1px solid #CBD5E1;border-radius:6px;padding:6px 22px 6px 10px;font-size:12px;font-weight:500;color:#0F172A;display:flex;align-items:center;gap:4px;cursor:pointer;position:relative;">
            All statuses
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#64748B" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m7 15 5 5 5-5"/><path d="m7 9 5-5 5 5"/></svg>
        </div>
    </div>
</div>

<!-- Quotations table -->
<div class="rt" style="background:#fff;border:1px solid #E2E8F0;border-radius:12px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.04);">
    <div style="display:grid;grid-template-columns:1.5fr 2fr 1fr 1fr 1fr;gap:8px;padding:10px 20px;background:#F8FAFC;border-bottom:1px solid #E2E8F0;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:#64748B;">
        <span>Student</span>
        <span>Program</span>
        <span>Amount</span>
        <span>Status</span>
        <span>Date</span>
    </div>
    {% for q in showcase.quotations %}
    <div style="display:grid;grid-template-columns:1.5fr 2fr 1fr 1fr 1fr;gap:8px;padding:12px 20px;border-bottom:{% if forloop.last %}none{% else %}1px solid #F1F5F9{% endif %};align-items:center;font-size:13px;transition:background .1s;" onmouseover="this.style.background='#FAFBFC'" onmouseout="this.style.background=''">
        <span style="color:#0F172A;font-weight:500;">{{ q.student }}</span>
        <span style="color:#475569;">{{ q.program }}</span>
        <span style="color:#0F172A;font-weight:600;">{{ q.amount }}</span>
        <span>
            <span style="font-size:10px;font-weight:500;padding:3px 8px;border-radius:100px;
                {% if q.status == 'approved' %}background:#ECFDF5;color:#059669;
                {% elif q.status == 'sent' %}background:#EDFBFD;color:#0E7589;
                {% elif q.status == 'negotiating' %}background:#FEF3C7;color:#D97706;
                {% else %}background:#F8FAFC;color:#64748B;{% endif %}">
                {{ q.status|title }}
            </span>
        </span>
        <span style="color:#64748B;">{{ q.date }}</span>
    </div>
    {% endfor %}
</div>
