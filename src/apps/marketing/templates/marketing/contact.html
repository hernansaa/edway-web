{% extends "marketing/base.html" %}

{% block content %}

<section style="padding:72px 0 56px;border-bottom:1px solid var(--border);background:var(--bg);">
    <div style="max-width:1152px;margin:0 auto;padding:0 24px;">
        <p class="sintra-label" style="margin-bottom:14px;">Contact</p>
        <h1 style="font-size:clamp(32px,4vw,52px);font-weight:700;letter-spacing:-0.04em;line-height:1.1;color:var(--text-heading);max-width:480px;margin-bottom:16px;">
            Get in touch.
        </h1>
        <p style="font-size:17px;color:var(--text-body);max-width:440px;line-height:1.75;">
            Questions, feedback, or just want to see a demo? We'll reply within 24 hours.
        </p>
    </div>
</section>

<section style="padding:64px 0;background:var(--bg);">
    <div style="max-width:1152px;margin:0 auto;padding:0 24px;">
        <div class="grid grid-cols-1 md:grid-cols-3" style="gap:16px;">
            <div class="sintra-card" style="padding:32px;">
                <div class="feature-icon" style="margin-bottom:20px;">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="var(--blue)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
                </div>
                <h3 style="font-size:14px;font-weight:600;color:var(--text-heading);margin-bottom:6px;">Email</h3>
                <p style="font-size:13px;color:var(--text-body);">info@sintraos.io</p>
            </div>
            <div class="sintra-card" style="padding:32px;">
                <div class="feature-icon" style="margin-bottom:20px;">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="var(--blue)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                </div>
                <h3 style="font-size:14px;font-weight:600;color:var(--text-heading);margin-bottom:6px;">Demo</h3>
                <a href="{% url 'marketing:demo' %}" style="font-size:13px;color:var(--blue);text-decoration:none;">Book a 30-min call →</a>
            </div>
            <div class="sintra-card" style="padding:32px;">
                <div class="feature-icon" style="margin-bottom:20px;">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="var(--blue)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                </div>
                <h3 style="font-size:14px;font-weight:600;color:var(--text-heading);margin-bottom:6px;">Response time</h3>
                <p style="font-size:13px;color:var(--text-body);">Within 24 hours</p>
            </div>
        </div>
    </div>
</section>

{% endblock %}
